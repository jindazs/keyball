name: Build QMK UF2 Firmware (keyball39 RP2040)

on:
  workflow_dispatch:
    inputs:
      qmk_version:
        description: "Optional QMK version to install"
        required: false
        default: ""
      keyboard:
        description: "Keyboard to build (e.g. keyball39)"
        required: false
        default: "keyball39"
      keymap:
        description: "Keymap to build"
        required: false
        default: "via"
  push:
    branches: [ "main" ]
  workflow_call:
    inputs:
      qmk_version:
        description: "Optional QMK version to install"
        required: false
        type: string
        default: ""
      keyboard:
        description: "Keyboard to build (e.g. keyball39)"
        required: false
        type: string
        default: "keyball39"
      keymap:
        description: "Keymap to build"
        required: false
        type: string
        default: "via"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYBOARD: ${{ inputs.keyboard || github.event.inputs.keyboard || 'keyball39' }}
      KEYMAP: ${{ inputs.keymap || github.event.inputs.keymap || 'via' }}
      QMK_VERSION: ${{ inputs.qmk_version || github.event.inputs.qmk_version || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install QMK
        run: |
          if [ -n "${QMK_VERSION}" ]; then
            pip install "qmk==${QMK_VERSION}"
          else
            pip install qmk
          fi

      - name: Setup QMK
        run: |
          qmk setup -y

      - name: Build UF2 Firmware
        run: |
          qmk compile -kb keyball/${KEYBOARD} -km ${KEYMAP}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: keyball39-rp2040-uf2
          path: ./**/.uf2
